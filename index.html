<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>DeepSeek 移动助手 | 回车换行 按钮发送</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', 'Helvetica Neue', Helvetica, sans-serif;
            padding: 16px;
            padding-bottom: 80px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.02);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 32px);
            background: #ffffff;
        }

        .header {
            background: #ffffff;
            padding: 20px 20px 12px;
            border-bottom: 1px solid #eef2f6;
        }
        .header h1 {
            font-size: 1.7rem;
            font-weight: 600;
            background: linear-gradient(135deg, #0f172a, #2d3a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .header p {
            font-size: 0.85rem;
            color: #5b6e8c;
            margin-top: 6px;
        }
        .api-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .status-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 40px;
            background: #eef2ff;
            color: #1e3a8a;
        }
        .status-badge.valid {
            background: #e0f2e9;
            color: #0b5e42;
        }
        .status-badge.invalid {
            background: #ffe8e6;
            color: #b91c1c;
        }
        .reset-key-btn, .export-btn {
            background: none;
            border: 1px solid #cfdfed;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #2c3e66;
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-key-btn:active, .export-btn:active {
            background: #f0f4fa;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            background: #fafcff;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 88%;
            animation: fadeInUp 0.2s ease;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.03);
        }
        .user .bubble {
            background: #0f172a;
            color: white;
            border-bottom-right-radius: 6px;
        }
        .assistant .bubble {
            background: #ffffff;
            border: 1px solid #e4e9f0;
            color: #1e293b;
            border-bottom-left-radius: 6px;
        }
        .message-time {
            font-size: 0.65rem;
            color: #8e9dae;
            margin: 4px 12px 0;
        }
        .user .message-time {
            text-align: right;
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: #f1f5f9;
            border-radius: 30px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #5f7f9e;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.9);}
            30% { opacity: 1; transform: scale(1.1);}
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .input-area {
            background: white;
            border-top: 1px solid #eef2f8;
            padding: 12px 16px 20px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-wrapper {
            flex: 1;
            background: #f2f5f9;
            border-radius: 30px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
        }
        .input-wrapper textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-family: inherit;
            padding: 8px 0;
            resize: none;
            max-height: 120px;
            outline: none;
            color: #0f172a;
        }
        .input-wrapper textarea::placeholder {
            color: #94a3b8;
        }
        .send-btn {
            background: #0f172a;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .send-btn:active {
            transform: scale(0.96);
            background: #1e293b;
        }
        .send-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .send-btn svg {
            width: 22px;
            height: 22px;
            stroke: white;
            fill: none;
            stroke-width: 2;
        }

        .error-banner {
            background: #fee2e2;
            color: #b91c1c;
            margin: 8px 16px;
            border-radius: 28px;
            padding: 10px 14px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #99a9c5;
            padding: 8px;
            background: white;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>DeepSeek · 随身AI</h1>
        <p>回车换行 | 按钮发送 | 对话自动保存</p>
        <div class="api-status">
            <span id="apiStatusBadge" class="status-badge">⚙️ 未配置密钥</span>
            <button id="resetApiKeyBtn" class="reset-key-btn">✏️ 更换密钥</button>
            <button id="exportChatBtn" class="export-btn">📄 导出对话</button>
            <button id="clearChatBtn" class="reset-key-btn" style="margin-left: auto;">🗑 清空对话</button>
        </div>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="输入消息... (回车换行，点击发送按钮提交)" rows="1"></textarea>
        </div>
        <button id="sendButton" class="send-btn" aria-label="发送">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
    <div id="globalErrorContainer"></div>
    <footer>数据通过 DeepSeek 官方 API 处理 | 对话记录自动保存在本地</footer>
</div>

<script>
    // ---------- 配置 ----------
    const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";
    const DEFAULT_MODEL = "deepseek-chat";
    
    // DOM 元素
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendButton');
    const resetKeyBtn = document.getElementById('resetApiKeyBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const exportChatBtn = document.getElementById('exportChatBtn');
    const apiStatusBadge = document.getElementById('apiStatusBadge');
    const globalErrorContainer = document.getElementById('globalErrorContainer');
    
    // 状态
    let messages = [];
    let isLoading = false;
    
    // ---------- 存储 KEY ----------
    function getCurrentApiKey() {
        return localStorage.getItem('deepseek_api_key')?.trim() || "";
    }
    
    function saveApiKeyToLocal(key) {
        if (key && key.trim()) {
            localStorage.setItem('deepseek_api_key', key.trim());
        } else {
            localStorage.removeItem('deepseek_api_key');
        }
        updateApiStatusUI();
    }
    
    function updateApiStatusUI() {
        const key = getCurrentApiKey();
        if (key) {
            const masked = key.length > 12 ? key.slice(0,8) + '...' + key.slice(-4) : '已配置';
            apiStatusBadge.innerHTML = `✅ API Key: ${masked}`;
            apiStatusBadge.className = "status-badge valid";
        } else {
            apiStatusBadge.innerHTML = `⚠️ 未配置 Key`;
            apiStatusBadge.className = "status-badge invalid";
        }
    }
    
    // ---------- 对话存储 ----------
    function saveConversation() {
        localStorage.setItem('deepseek_conversation', JSON.stringify(messages));
    }
    
    function loadConversation() {
        const saved = localStorage.getItem('deepseek_conversation');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    messages = parsed;
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }
    
    function clearConversationStorage() {
        localStorage.removeItem('deepseek_conversation');
    }
    
    function renderAllMessages() {
        chatArea.innerHTML = '';
        const displayMessages = messages.filter(m => m.role !== 'system');
        for (const msg of displayMessages) {
            appendMessageToUI(msg.role, msg.content, null, false);
        }
        scrollToBottom();
    }
    
    function appendMessageToUI(role, content, timestamp = null, autoSave = true) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = content.replace(/\n/g, '<br>');
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        const now = timestamp || new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        timeSpan.innerText = timeStr;
        messageDiv.appendChild(bubble);
        messageDiv.appendChild(timeSpan);
        chatArea.appendChild(messageDiv);
        if (autoSave) scrollToBottom();
        return messageDiv;
    }
    
    function resetConversation() {
        messages = [];
        messages.push({
            role: "system",
            content: "You are DeepSeek, a helpful, respectful and honest assistant. Always respond in the same language as the user."
        });
        chatArea.innerHTML = '';
        appendMessageToUI('assistant', '✨ 对话已重置。我是 DeepSeek 助手，有什么可以帮你的吗？');
        saveConversation();
    }
    
    function clearAllChat() {
        if (isLoading) {
            showTemporaryError("请等待回复完成后再清空", 1500);
            return;
        }
        resetConversation();
        showTemporaryError("🧹 对话已清空，历史记录已删除", 1500);
    }
    
    function exportChat() {
        const exportMessages = messages.filter(m => m.role !== 'system');
        if (exportMessages.length === 0) {
            showTemporaryError("没有对话记录可导出", 1500);
            return;
        }
        let exportText = "DeepSeek 对话导出\n";
        exportText += `导出时间: ${new Date().toLocaleString()}\n`;
        exportText += "=".repeat(40) + "\n\n";
        for (const msg of exportMessages) {
            const roleName = msg.role === 'user' ? '👤 我' : '🤖 DeepSeek';
            exportText += `【${roleName}】\n${msg.content}\n\n`;
        }
        const blob = new Blob([exportText], { type: 'text/plain' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `deepseek_chat_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.txt`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showTemporaryError("✅ 对话已导出到下载文件夹", 2000);
    }
    
    function showTemporaryError(message, duration = 4000) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-banner';
        errorDiv.innerHTML = `<span>⚠️ ${message}</span><button style="background:none; border:none; font-weight:bold; margin-left:8px;">✖</button>`;
        const closeBtn = errorDiv.querySelector('button');
        closeBtn.addEventListener('click', () => errorDiv.remove());
        globalErrorContainer.innerHTML = '';
        globalErrorContainer.appendChild(errorDiv);
        setTimeout(() => {
            if (errorDiv && errorDiv.parentNode) errorDiv.remove();
        }, duration);
    }
    
    let typingIndicatorElement = null;
    function showTypingIndicator() {
        removeTypingIndicator();
        const indicatorDiv = document.createElement('div');
        indicatorDiv.className = 'message assistant';
        indicatorDiv.id = 'typingIndicator';
        const bubbleWrap = document.createElement('div');
        bubbleWrap.className = 'bubble';
        bubbleWrap.style.background = "#f1f5f9";
        bubbleWrap.style.padding = "12px 18px";
        bubbleWrap.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        indicatorDiv.appendChild(bubbleWrap);
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        timeSpan.innerText = "正在思考...";
        indicatorDiv.appendChild(timeSpan);
        chatArea.appendChild(indicatorDiv);
        scrollToBottom();
        typingIndicatorElement = indicatorDiv;
    }
    
    function removeTypingIndicator() {
        if (typingIndicatorElement && typingIndicatorElement.parentNode) {
            typingIndicatorElement.remove();
            typingIndicatorElement = null;
        }
    }
    
    function scrollToBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    
    function autoResizeTextarea() {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    }
    
    async function callDeepSeekAPI(userMessage) {
        const apiKey = getCurrentApiKey();
        if (!apiKey) throw new Error("NO_API_KEY");
        
        const requestBody = {
            model: DEFAULT_MODEL,
            messages: messages,
            temperature: 0.8,
            max_tokens: 2048,
            stream: false
        };
        
        const response = await fetch(DEEPSEEK_API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify(requestBody)
        });
        
        if (!response.ok) {
            let errorDetail = `HTTP ${response.status}`;
            try {
                const errData = await response.json();
                errorDetail = errData.error?.message || JSON.stringify(errData);
            } catch(e) {}
            throw new Error(errorDetail);
        }
        
        const data = await response.json();
        if (!data.choices?.[0]?.message) throw new Error("API 返回格式异常");
        
        const assistantReply = data.choices[0].message.content;
        messages.push({ role: "assistant", content: assistantReply });
        return assistantReply;
    }
    
    async function sendMessage() {
        if (isLoading) {
            showTemporaryError("请等待上一个回复完成", 1500);
            return;
        }
        let text = userInput.value.trim();
        if (text === "") return;
        
        const apiKey = getCurrentApiKey();
        if (!apiKey) {
            showTemporaryError("🔑 请先点击「更换密钥」配置 DeepSeek API Key", 3000);
            return;
        }
        
        userInput.value = "";
        autoResizeTextarea();
        appendMessageToUI('user', text);
        
        messages.push({ role: "user", content: text });
        saveConversation();
        
        isLoading = true;
        sendBtn.classList.add('disabled');
        showTypingIndicator();
        
        try {
            const reply = await callDeepSeekAPI(text);
            removeTypingIndicator();
            appendMessageToUI('assistant', reply);
            saveConversation();
        } catch (err) {
            removeTypingIndicator();
            console.error(err);
            let errorMsg = err.message;
            if (errorMsg.includes("NO_API_KEY")) {
                errorMsg = "未配置 API Key，请点击「更换密钥」设置";
            } else if (errorMsg.includes("401") || errorMsg.includes("Incorrect API key")) {
                errorMsg = "API Key 无效，请重新更换密钥";
                saveApiKeyToLocal("");
            } else if (errorMsg.includes("429")) {
                errorMsg = "请求频率过高，请稍后再试";
            } else if (errorMsg.includes("insufficient")) {
                errorMsg = "账户余额不足，请充值";
            }
            appendMessageToUI('assistant', `❌ 错误：${errorMsg}`);
            if (messages.length > 0 && messages[messages.length-1].role === "user") {
                messages.pop();
                saveConversation();
            }
        } finally {
            isLoading = false;
            sendBtn.classList.remove('disabled');
            userInput.focus();
            scrollToBottom();
        }
    }
    
    function promptApiKey() {
        const current = getCurrentApiKey();
        let newKey = prompt("🔑 请输入 DeepSeek API Key", current);
        if (newKey !== null) {
            newKey = newKey.trim();
            if (newKey === "") {
                saveApiKeyToLocal("");
                showTemporaryError("API Key 已清空", 1500);
                resetConversation();
            } else {
                saveApiKeyToLocal(newKey);
                showTemporaryError("✅ API Key 已保存，对话历史保持不变", 2000);
            }
        }
    }
    
    function init() {
        updateApiStatusUI();
        const hasHistory = loadConversation();
        if (hasHistory && messages.length > 0) {
            if (!messages.some(m => m.role === 'system')) {
                messages.unshift({
                    role: "system",
                    content: "You are DeepSeek, a helpful assistant. Always respond in the same language as the user."
                });
                saveConversation();
            }
            renderAllMessages();
        } else {
            resetConversation();
        }
        
        sendBtn.addEventListener('click', sendMessage);
        resetKeyBtn.addEventListener('click', promptApiKey);
        clearChatBtn.addEventListener('click', clearAllChat);
        exportChatBtn.addEventListener('click', exportChat);
        
        // 关键修改：回车只换行，不发送
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                // 不做任何事，让回车自然换行
                // 不调用 preventDefault 也不调用 sendMessage
                return;
            }
        });
        
        userInput.addEventListener('input', autoResizeTextarea);
        autoResizeTextarea();
    }
    
    init();
</script>
</body>
</html>
