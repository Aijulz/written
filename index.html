<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>DeepSeek 移动助手 | 安卓手机端AI对话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', 'Helvetica Neue', Helvetica, sans-serif;
            padding: 16px;
            padding-bottom: 80px;
            min-height: 100vh;
        }

        /* 主容器 */
        .app-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.02);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 32px);
            background: #ffffff;
        }

        /* 头部 */
        .header {
            background: #ffffff;
            padding: 20px 20px 12px;
            border-bottom: 1px solid #eef2f6;
        }
        .header h1 {
            font-size: 1.7rem;
            font-weight: 600;
            background: linear-gradient(135deg, #0f172a, #2d3a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .header p {
            font-size: 0.85rem;
            color: #5b6e8c;
            margin-top: 6px;
        }
        .api-status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .status-badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 40px;
            background: #eef2ff;
            color: #1e3a8a;
        }
        .status-badge.valid {
            background: #e0f2e9;
            color: #0b5e42;
        }
        .status-badge.invalid {
            background: #ffe8e6;
            color: #b91c1c;
        }
        .reset-key-btn {
            background: none;
            border: 1px solid #cfdfed;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #2c3e66;
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-key-btn:active {
            background: #f0f4fa;
        }

        /* 聊天区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
            background: #fafcff;
        }
        /* 消息气泡 */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 88%;
            animation: fadeInUp 0.2s ease;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.45;
            word-break: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.03);
        }
        .user .bubble {
            background: #0f172a;
            color: white;
            border-bottom-right-radius: 6px;
        }
        .assistant .bubble {
            background: #ffffff;
            border: 1px solid #e4e9f0;
            color: #1e293b;
            border-bottom-left-radius: 6px;
        }
        .message-time {
            font-size: 0.65rem;
            color: #8e9dae;
            margin: 4px 12px 0;
        }
        .user .message-time {
            text-align: right;
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: #f1f5f9;
            border-radius: 30px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #5f7f9e;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.9);}
            30% { opacity: 1; transform: scale(1.1);}
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* 底部输入区 */
        .input-area {
            background: white;
            border-top: 1px solid #eef2f8;
            padding: 12px 16px 20px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-wrapper {
            flex: 1;
            background: #f2f5f9;
            border-radius: 30px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
        }
        .input-wrapper textarea {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-family: inherit;
            padding: 8px 0;
            resize: none;
            max-height: 120px;
            outline: none;
            color: #0f172a;
        }
        .input-wrapper textarea::placeholder {
            color: #94a3b8;
        }
        .send-btn {
            background: #0f172a;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .send-btn:active {
            transform: scale(0.96);
            background: #1e293b;
        }
        .send-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .send-btn svg {
            width: 22px;
            height: 22px;
            stroke: white;
            fill: none;
            stroke-width: 2;
        }

        /* 提示条 & 错误 */
        .info-tip {
            background: #fef9e3;
            margin: 8px 16px 0;
            border-radius: 20px;
            padding: 8px 12px;
            font-size: 0.7rem;
            color: #b45309;
            text-align: center;
        }
        .error-banner {
            background: #fee2e2;
            color: #b91c1c;
            margin: 8px 16px;
            border-radius: 28px;
            padding: 10px 14px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .clear-chat {
            background: none;
            border: none;
            font-size: 0.7rem;
            color: #5f7f9e;
            text-decoration: underline;
            margin-left: 10px;
        }
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #99a9c5;
            padding: 8px;
            background: white;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>DeepSeek · 随身AI</h1>
        <p>安卓手机端适配 | 官方API对话</p>
        <div class="api-status">
            <span id="apiStatusBadge" class="status-badge">⚙️ 未配置密钥</span>
            <button id="resetApiKeyBtn" class="reset-key-btn">✏️ 更换密钥</button>
            <button id="clearChatBtn" class="reset-key-btn" style="margin-left: auto;">🗑 清空对话</button>
        </div>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="message assistant">
            <div class="bubble">
                👋 你好！我是 DeepSeek AI 助手。<br>
                请先在上方点击「更换密钥」输入你的 DeepSeek API Key，然后就可以开始对话啦。
            </div>
            <div class="message-time">刚刚</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="输入消息... (支持换行，发送按钮提交)" rows="1"></textarea>
        </div>
        <button id="sendButton" class="send-btn" aria-label="发送">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
    <div id="globalErrorContainer"></div>
    <footer>数据通过 DeepSeek 官方 API 处理 | 密钥本地存储</footer>
</div>

<script>
    // ---------- 配置 ----------
    // DeepSeek 官方 API 地址 (兼容 OpenAI 风格)
    const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";
    // 推荐模型: deepseek-chat 或 deepseek-reasoner，这里使用 deepseek-chat 性价比高
    const DEFAULT_MODEL = "deepseek-chat";
    
    // DOM 元素
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendButton');
    const resetKeyBtn = document.getElementById('resetApiKeyBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const apiStatusBadge = document.getElementById('apiStatusBadge');
    const globalErrorContainer = document.getElementById('globalErrorContainer');
    
    // 状态管理
    let messages = [];      // 存储 { role, content } 用于API上下文
    let isLoading = false;  // 是否正在请求中
    let currentApiKey = ""; // 当前使用的API Key
    
    // ---------- 存储 KEY 操作 ----------
    function loadApiKey() {
        const storedKey = localStorage.getItem('deepseek_api_key');
        if (storedKey && storedKey.trim() !== "") {
            currentApiKey = storedKey.trim();
            updateApiStatusUI(true);
        } else {
            currentApiKey = "";
            updateApiStatusUI(false);
        }
    }
    
    function saveApiKey(key) {
        if (key && key.trim() !== "") {
            localStorage.setItem('deepseek_api_key', key.trim());
            currentApiKey = key.trim();
            updateApiStatusUI(true);
        } else {
            localStorage.removeItem('deepseek_api_key');
            currentApiKey = "";
            updateApiStatusUI(false);
        }
    }
    
    function updateApiStatusUI(valid) {
        if (valid && currentApiKey) {
            // 显示密钥脱敏
            const masked = currentApiKey.length > 12 ? currentApiKey.slice(0,8) + '...' + currentApiKey.slice(-4) : '已配置';
            apiStatusBadge.innerHTML = `✅ API Key: ${masked}`;
            apiStatusBadge.className = "status-badge valid";
        } else {
            apiStatusBadge.innerHTML = `⚠️ 未配置或无效 Key`;
            apiStatusBadge.className = "status-badge invalid";
        }
    }
    
    // 更换密钥弹窗 (移动端友好)
    function promptApiKey() {
        let newKey = prompt("🔑 请输入你的 DeepSeek API Key\n(获取地址: platform.deepseek.com/api_keys)", currentApiKey || "");
        if (newKey !== null) {
            newKey = newKey.trim();
            if (newKey === "") {
                saveApiKey("");
                showTemporaryError("API Key 已清空，请配置后再使用对话功能。", 3000);
                // 清空上下文并重置欢迎消息? 不清空上下文，但后续对话会因为没有key而提示
                // 为了避免混淆，清一下上下文比较好
                resetConversation();
                return;
            } else {
                saveApiKey(newKey);
                showTemporaryError("✅ API Key 已保存！可以开始对话了。", 2000);
                // 重置会话，让新key干净开始
                resetConversation();
            }
        }
    }
    
    // 显示临时错误/提示 (在顶部浮动)
    let errorTimeout = null;
    function showTemporaryError(message, duration = 4000) {
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-banner';
        errorDiv.innerHTML = `<span>⚠️ ${message}</span><button style="background:none; border:none; font-weight:bold; margin-left:8px;">✖</button>`;
        const closeBtn = errorDiv.querySelector('button');
        closeBtn.addEventListener('click', () => errorDiv.remove());
        globalErrorContainer.innerHTML = '';
        globalErrorContainer.appendChild(errorDiv);
        if (errorTimeout) clearTimeout(errorTimeout);
        errorTimeout = setTimeout(() => {
            if (errorDiv && errorDiv.parentNode) errorDiv.remove();
        }, duration);
    }
    
    // 清空对话 (本地聊天记录)
    function resetConversation() {
        messages = [];   // 清空上下文
        // 清空聊天界面但保留默认欢迎消息
        chatArea.innerHTML = '';
        // 添加一个全新的助手欢迎消息
        appendMessageToUI('assistant', '👋 对话已重置！我是 DeepSeek 助手，有什么可以帮你的吗？');
        // 同时系统消息可以加一个友好的系统提示但不需要存储到messages
        // 可选: 在messages中初始化一条 system 指令 (但不是必须)
        messages.push({
            role: "system",
            content: "You are DeepSeek, a helpful, respectful and honest assistant. Always respond in the same language as the user."
        });
        scrollToBottom();
    }
    
    // 清空UI只保留系统消息 (内部调用reset)
    function hardClearChat() {
        if (!isLoading) {
            resetConversation();
            showTemporaryError("🧹 聊天记录已清空", 1500);
        } else {
            showTemporaryError("请等待当前回复完成后再清空", 1500);
        }
    }
    
    // 将消息渲染到UI
    function appendMessageToUI(role, content, timestamp = null) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        // 简单markdown换行处理 (支持\n)
        bubble.innerHTML = content.replace(/\n/g, '<br>');
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        const now = timestamp || new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        timeSpan.innerText = timeStr;
        messageDiv.appendChild(bubble);
        messageDiv.appendChild(timeSpan);
        chatArea.appendChild(messageDiv);
        scrollToBottom();
        return messageDiv;
    }
    
    // 显示“正在输入...”指示器
    let typingIndicatorElement = null;
    function showTypingIndicator() {
        removeTypingIndicator();
        const indicatorDiv = document.createElement('div');
        indicatorDiv.className = 'message assistant';
        indicatorDiv.id = 'typingIndicator';
        const bubbleWrap = document.createElement('div');
        bubbleWrap.className = 'bubble';
        bubbleWrap.style.background = "#f1f5f9";
        bubbleWrap.style.padding = "12px 18px";
        const typingHtml = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        bubbleWrap.innerHTML = typingHtml;
        indicatorDiv.appendChild(bubbleWrap);
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        timeSpan.innerText = "正在思考...";
        indicatorDiv.appendChild(timeSpan);
        chatArea.appendChild(indicatorDiv);
        scrollToBottom();
        typingIndicatorElement = indicatorDiv;
    }
    
    function removeTypingIndicator() {
        if (typingIndicatorElement && typingIndicatorElement.parentNode) {
            typingIndicatorElement.remove();
            typingIndicatorElement = null;
        }
    }
    
    function scrollToBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
    }
    
    // 自适应文本框高度
    function autoResizeTextarea() {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
    }
    
    // 调用 DeepSeek API
    async function callDeepSeekAPI(userMessage) {
        if (!currentApiKey || currentApiKey.trim() === "") {
            throw new Error("请先设置有效的 DeepSeek API Key (点击「更换密钥」)");
        }
        
        // 将用户消息加入到 messages 上下文
        messages.push({ role: "user", content: userMessage });
        
        // 构建请求体
        const requestBody = {
            model: DEFAULT_MODEL,
            messages: messages,
            temperature: 0.7,
            max_tokens: 2048,
            stream: false   // 为了简单实现，非流式; 手机端体验也够
        };
        
        const response = await fetch(DEEPSEEK_API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${currentApiKey}`
            },
            body: JSON.stringify(requestBody)
        });
        
        if (!response.ok) {
            let errorDetail = `HTTP ${response.status}`;
            try {
                const errData = await response.json();
                errorDetail = errData.error?.message || JSON.stringify(errData);
            } catch(e) {}
            throw new Error(`API 请求失败: ${errorDetail}`);
        }
        
        const data = await response.json();
        if (!data.choices || !data.choices[0] || !data.choices[0].message) {
            throw new Error("API 返回数据格式异常");
        }
        
        const assistantReply = data.choices[0].message.content;
        // 将助手回复存入上下文
        messages.push({ role: "assistant", content: assistantReply });
        return assistantReply;
    }
    
    // 发送消息主流程
    async function sendMessage() {
        if (isLoading) {
            showTemporaryError("请等待上一个回复完成", 1500);
            return;
        }
        let text = userInput.value.trim();
        if (text === "") return;
        
        // 未配置key时的拦截
        if (!currentApiKey) {
            showTemporaryError("🔑 请先点击「更换密钥」配置你的 DeepSeek API Key", 3000);
            return;
        }
        
        // 清空输入框
        userInput.value = "";
        autoResizeTextarea();
        // 显示用户消息
        appendMessageToUI('user', text);
        
        isLoading = true;
        sendBtn.classList.add('disabled');
        showTypingIndicator();
        
        try {
            const assistantReply = await callDeepSeekAPI(text);
            removeTypingIndicator();
            appendMessageToUI('assistant', assistantReply);
        } catch (err) {
            removeTypingIndicator();
            console.error("DeepSeek API 错误:", err);
            let errorMsg = err.message;
            // 增强可读性
            if (errorMsg.includes("401")) {
                errorMsg = "API Key 无效或已过期，请重新更换密钥。";
                saveApiKey("");  // 自动清空无效key
                updateApiStatusUI(false);
            } else if (errorMsg.includes("429")) {
                errorMsg = "请求频率过高，请稍后再试。";
            } else if (errorMsg.includes("402") || errorMsg.includes("insufficient")) {
                errorMsg = "账户余额不足，请检查 DeepSeek 账户。";
            } else {
                errorMsg = `出错: ${errorMsg}`;
            }
            // 在UI中展示错误提示并显示助手错误消息
            appendMessageToUI('assistant', `❌ 抱歉，发生错误：${errorMsg}\n\n请检查 API Key 或网络后重试。`);
            // 重要: 如果调用失败, 需要将之前 push 的用户消息从上下文中移除，避免污染上下文
            // 因为用户消息已 push，但是 API 失败未获得 assistant 回复，要 pop 掉
            if (messages.length > 0 && messages[messages.length-1].role === "user") {
                messages.pop();
            }
        } finally {
            isLoading = false;
            sendBtn.classList.remove('disabled');
            userInput.focus();
            scrollToBottom();
        }
    }
    
    // 监听发送事件
    function initEventListeners() {
        sendBtn.addEventListener('click', sendMessage);
        resetKeyBtn.addEventListener('click', () => {
            promptApiKey();
        });
        clearChatBtn.addEventListener('click', () => {
            if (isLoading) {
                showTemporaryError("请等待回复完成后再清空", 1500);
                return;
            }
            hardClearChat();
        });
        userInput.addEventListener('keydown', (e) => {
            // 在安卓手机上，回车键通常发送，但 shift+enter 换行。适配软键盘
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        userInput.addEventListener('input', autoResizeTextarea);
        // 初始自适应
        autoResizeTextarea();
    }
    
    // 初始化聊天上下文以及本地存储Key，并展示默认系统消息
    function initConversation() {
        // 重置messages数组，添加系统提示
        messages = [];
        messages.push({
            role: "system",
            content: "You are DeepSeek, a helpful assistant. Answer concisely and in the same language as the user."
        });
        // 清空UI区域但保留助手欢迎消息 (避免重复添加)
        chatArea.innerHTML = '';
        appendMessageToUI('assistant', '✨ 已连接 DeepSeek 官方 API。\n💡 点击「更换密钥」输入你的 API Key 即可开始对话。');
    }
    
    // 入口初始化
    function bootstrap() {
        loadApiKey();
        initConversation();
        initEventListeners();
        // 如果没有API Key，给出温和提示
        if (!currentApiKey) {
            setTimeout(() => {
                showTemporaryError("📌 开始之前，请点击「更换密钥」设置 DeepSeek API Key（从 platform.deepseek.com 获取）", 5000);
            }, 500);
        }
    }
    
    bootstrap();
</script>
</body>
</html>
